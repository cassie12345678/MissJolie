<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Miss Jolie</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <section id="login-screen" class="login-box">
        <h2>Admin Login</h2>
        <p class="muted">Voer het beheerderswachtwoord in om de collecties en bookings te bekijken.</p>
        <input id="adminPass" type="password" placeholder="Wachtwoord">
        <button id="loginBtn" class="btn btn-primary" type="button">Inloggen</button>
        <p id="loginError"></p>
    </section>

    <main id="admin-panel" class="page-shell hidden">
        <header class="admin-header">
            <div>
                <h1>Admin Dashboard</h1>
                <p class="muted">Beheer collecties en bekijk opgeslagen bookings.</p>
            </div>
            <div class="header-actions">
                <a class="btn btn-ghost" href="home.html">Terug naar site</a>
                <button id="saveBtn" class="btn btn-primary" type="button">Opslaan</button>
            </div>
        </header>

        <section class="panel">
            <div class="panel-top">
                <h2>Collectie instellingen</h2>
            </div>
            <div id="collectionList"></div>
        </section>

        <section class="panel">
            <div class="panel-top">
                <h2>Bookings</h2>
            </div>
            <div id="bookingsList"></div>
        </section>

        <section class="panel">
            <div class="panel-top">
                <h2>Kortingscodes</h2>
                <button id="addDiscountBtn" class="btn btn-ghost" type="button">+ Nieuwe code</button>
                <button id="saveDiscountsBtn" class="btn btn-primary" type="button">Kortingscodes opslaan</button>
            </div>
            <div id="discountList"></div>
        </section>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
